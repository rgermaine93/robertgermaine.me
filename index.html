<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="site.css" />
  </head>
  <body>
    <section class="hero-page">
      <!-- Top fade + dashed grid (BackgroundPattern22) -->
      <div class="bg-pattern-22" aria-hidden="true"></div>
      <div class="pattern-placeholder" aria-hidden="true"></div>
      <div class="hero-animated">
        <div class="hero-inner">
          <img
            src="images/avatar.jpg"
            alt="avatar"
            class="hero-avatar"
          />
          <h3 class="hero-heading">
            Hello, I'm Rob, a Greenville, SC based UI/UX designer shaping memorable brand experiences.
          </h3>
          <div class="hero-actions">
            <a class="hero-link hero-link-outline" href="https://www.shadcnblocks.com">See my work</a>
            <a class="hero-link" href="https://www.shadcnblocks.com">Let's collaborate</a>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
