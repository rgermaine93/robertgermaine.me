<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="floating-lines" class="floating-lines-bg" aria-hidden="true"></div>
    <div class="page-content">
    <nav class="navbar effect">
        <div class="nav-container">
            <div class="nav-links">
                <a href="#resume" class="nav-link">Resume</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link active">Contact</a>
            </div>
        </div>
    </nav>
    <h1 id="welcome-text" class="scroll-m-20 text-center text-4xl font-extrabold tracking-tight text-balance">
      Humans were created to create.
    </h1>
    <div class="container">
        <form class="contact-form">
            <h1 class="form-title">Contact me</h1>
            <p class="form-description">Contact me and I'll get back to you as soon as possible.</p>
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail address</label>
                <input type="email" id="email" name="email" placeholder="Enter your e-mail address..." required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Choose a category</option>
                    <option value="general">General Inquiry</option>
                    <option value="business">Business</option>
                    <option value="support">Support</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Type your message here." required></textarea>
            </div>
            
            <button type="submit" class="submit-button">Send Message</button>
        </form>
    </div>

    <!-- Calendar Component -->
    <div class="calendar-container">
        <div id="calendar" class="calendar rounded-md border shadow-sm"></div>
    </div>
    </div>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

        const container = document.getElementById("floating-lines");
        if (container) {
            const vertexShader = `
precision highp float;

void main() {
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;

            const fragmentShader = `
precision highp float;

uniform float iTime;
uniform vec3  iResolution;
uniform float animationSpeed;

uniform bool enableTop;
uniform bool enableMiddle;
uniform bool enableBottom;

uniform int topLineCount;
uniform int middleLineCount;
uniform int bottomLineCount;

uniform float topLineDistance;
uniform float middleLineDistance;
uniform float bottomLineDistance;

uniform vec3 topWavePosition;
uniform vec3 middleWavePosition;
uniform vec3 bottomWavePosition;

uniform vec2 iMouse;
uniform bool interactive;
uniform float bendRadius;
uniform float bendStrength;
uniform float bendInfluence;

uniform bool parallax;
uniform float parallaxStrength;
uniform vec2 parallaxOffset;

uniform vec3 lineGradient[8];
uniform int lineGradientCount;

const vec3 BLACK = vec3(0.0);
const vec3 PINK  = vec3(233.0, 71.0, 245.0) / 255.0;
const vec3 BLUE  = vec3(47.0,  75.0, 162.0) / 255.0;

mat2 rotate(float r) {
  return mat2(cos(r), sin(r), -sin(r), cos(r));
}

vec3 background_color(vec2 uv) {
  vec3 col = vec3(0.0);

  float y = sin(uv.x - 0.2) * 0.3 - 0.1;
  float m = uv.y - y;

  col += mix(BLUE, BLACK, smoothstep(0.0, 1.0, abs(m)));
  col += mix(PINK, BLACK, smoothstep(0.0, 1.0, abs(m - 0.8)));
  return col * 0.5;
}

vec3 getLineColor(float t, vec3 baseColor) {
  if (lineGradientCount <= 0) {
    return baseColor;
  }

  vec3 gradientColor;
  
  if (lineGradientCount == 1) {
    gradientColor = lineGradient[0];
  } else {
    float clampedT = clamp(t, 0.0, 0.9999);
    float scaled = clampedT * float(lineGradientCount - 1);
    int idx = int(floor(scaled));
    float f = fract(scaled);
    int idx2 = min(idx + 1, lineGradientCount - 1);

    vec3 c1 = lineGradient[idx];
    vec3 c2 = lineGradient[idx2];
    
    gradientColor = mix(c1, c2, f);
  }
  
  return gradientColor * 0.5;
}

  float wave(vec2 uv, float offset, vec2 screenUv, vec2 mouseUv, bool shouldBend) {
  float time = iTime * animationSpeed;

  float x_offset   = offset;
  float x_movement = time * 0.1;
  float amp        = sin(offset + time * 0.2) * 0.3;
  float y          = sin(uv.x + x_offset + x_movement) * amp;

  if (shouldBend) {
    vec2 d = screenUv - mouseUv;
    float influence = exp(-dot(d, d) * bendRadius);
    float bendOffset = (mouseUv.y - screenUv.y) * influence * bendStrength * bendInfluence;
    y += bendOffset;
  }

  float m = uv.y - y;
  return 0.0175 / max(abs(m) + 0.01, 1e-3) + 0.01;
}

void mainImage(out vec4 fragColor, in vec2 fragCoord) {
  vec2 baseUv = (2.0 * fragCoord - iResolution.xy) / iResolution.y;
  baseUv.y *= -1.0;
  
  if (parallax) {
    baseUv += parallaxOffset;
  }

  vec3 col = vec3(0.0);

  vec3 b = lineGradientCount > 0 ? vec3(0.0) : background_color(baseUv);

  vec2 mouseUv = vec2(0.0);
  if (interactive) {
    mouseUv = (2.0 * iMouse - iResolution.xy) / iResolution.y;
    mouseUv.y *= -1.0;
  }
  
  if (enableBottom) {
    for (int i = 0; i < bottomLineCount; ++i) {
      float fi = float(i);
      float t = fi / max(float(bottomLineCount - 1), 1.0);
      vec3 lineCol = getLineColor(t, b);
      
      float angle = bottomWavePosition.z * log(length(baseUv) + 1.0);
      vec2 ruv = baseUv * rotate(angle);
      col += lineCol * wave(
        ruv + vec2(bottomLineDistance * fi + bottomWavePosition.x, bottomWavePosition.y),
        1.5 + 0.2 * fi,
        baseUv,
        mouseUv,
        interactive
      ) * 0.2;
    }
  }

  if (enableMiddle) {
    for (int i = 0; i < middleLineCount; ++i) {
      float fi = float(i);
      float t = fi / max(float(middleLineCount - 1), 1.0);
      vec3 lineCol = getLineColor(t, b);
      
      float angle = middleWavePosition.z * log(length(baseUv) + 1.0);
      vec2 ruv = baseUv * rotate(angle);
      col += lineCol * wave(
        ruv + vec2(middleLineDistance * fi + middleWavePosition.x, middleWavePosition.y),
        2.0 + 0.15 * fi,
        baseUv,
        mouseUv,
        interactive
      );
    }
  }

  if (enableTop) {
    for (int i = 0; i < topLineCount; ++i) {
      float fi = float(i);
      float t = fi / max(float(topLineCount - 1), 1.0);
      vec3 lineCol = getLineColor(t, b);
      
      float angle = topWavePosition.z * log(length(baseUv) + 1.0);
      vec2 ruv = baseUv * rotate(angle);
      ruv.x *= -1.0;
      col += lineCol * wave(
        ruv + vec2(topLineDistance * fi + topWavePosition.x, topWavePosition.y),
        1.0 + 0.2 * fi,
        baseUv,
        mouseUv,
        interactive
      ) * 0.1;
    }
  }

  fragColor = vec4(col, 1.0);
}

void main() {
  vec4 color = vec4(0.0);
  mainImage(color, gl_FragCoord.xy);
  gl_FragColor = color;
}
`;

            const MAX_GRADIENT_STOPS = 8;

            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            camera.position.z = 1;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.domElement.style.width = "100%";
            renderer.domElement.style.height = "100%";
            container.appendChild(renderer.domElement);

            const uniforms = {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector3(1, 1, 1) },
                animationSpeed: { value: 1 },

                enableTop: { value: true },
                enableMiddle: { value: true },
                enableBottom: { value: true },

                topLineCount: { value: 6 },
                middleLineCount: { value: 6 },
                bottomLineCount: { value: 6 },

                topLineDistance: { value: 0.05 },
                middleLineDistance: { value: 0.05 },
                bottomLineDistance: { value: 0.05 },

                topWavePosition: { value: new THREE.Vector3(10.0, 0.5, -0.4) },
                middleWavePosition: { value: new THREE.Vector3(5.0, 0.0, 0.2) },
                bottomWavePosition: { value: new THREE.Vector3(2.0, -0.7, 0.4) },

                iMouse: { value: new THREE.Vector2(-1000, -1000) },
                interactive: { value: true },
                bendRadius: { value: 5.0 },
                bendStrength: { value: -0.5 },
                bendInfluence: { value: 0 },

                parallax: { value: true },
                parallaxStrength: { value: 0.2 },
                parallaxOffset: { value: new THREE.Vector2(0, 0) },

                lineGradient: {
                    value: Array.from({ length: MAX_GRADIENT_STOPS }, () => new THREE.Vector3(1, 1, 1))
                },
                lineGradientCount: { value: 0 }
            };

            const material = new THREE.ShaderMaterial({
                uniforms,
                vertexShader,
                fragmentShader
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const clock = new THREE.Clock();

            const setSize = () => {
                const rect = container.getBoundingClientRect();
                const width = rect.width || window.innerWidth || 1;
                const height = rect.height || window.innerHeight || 1;
                renderer.setSize(width, height, false);

                const canvasWidth = renderer.domElement.width;
                const canvasHeight = renderer.domElement.height;
                uniforms.iResolution.value.set(canvasWidth, canvasHeight, 1);
            };

            setSize();

            const ro = typeof ResizeObserver !== "undefined" ? new ResizeObserver(setSize) : null;
            if (ro) {
                ro.observe(container);
            } else {
                window.addEventListener("resize", setSize);
            }

            const targetMouse = new THREE.Vector2(-1000, -1000);
            const currentMouse = new THREE.Vector2(-1000, -1000);
            let targetInfluence = 0;
            let currentInfluence = 0;
            const targetParallax = new THREE.Vector2(0, 0);
            const currentParallax = new THREE.Vector2(0, 0);
            const mouseDamping = 0.05;

            const handlePointerMove = event => {
                const rect = renderer.domElement.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                const dpr = renderer.getPixelRatio();

                targetMouse.set(x * dpr, (rect.height - y) * dpr);
                targetInfluence = 1.0;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const offsetX = (x - centerX) / rect.width;
                const offsetY = -(y - centerY) / rect.height;
                targetParallax.set(offsetX * 0.2, offsetY * 0.2);
            };

            const handlePointerLeave = () => {
                targetInfluence = 0.0;
            };

            window.addEventListener("pointermove", handlePointerMove);
            window.addEventListener("pointerleave", handlePointerLeave);

            const renderLoop = () => {
                uniforms.iTime.value = clock.getElapsedTime();

                currentMouse.lerp(targetMouse, mouseDamping);
                uniforms.iMouse.value.copy(currentMouse);

                currentInfluence += (targetInfluence - currentInfluence) * mouseDamping;
                uniforms.bendInfluence.value = currentInfluence;

                currentParallax.lerp(targetParallax, mouseDamping);
                uniforms.parallaxOffset.value.copy(currentParallax);

                renderer.render(scene, camera);
                requestAnimationFrame(renderLoop);
            };
            renderLoop();
        }
    </script>

    <script src="js/gsap.min.js"></script>
    <script src="js/SplitText.min.js"></script>

    <script>
        // Wait for both GSAP and SplitText to be available
        function initGSAPAnimation() {
            if (typeof gsap !== 'undefined' && gsap.to && typeof SplitText !== 'undefined') {
                // Register SplitText plugin
                gsap.registerPlugin(SplitText);

                // Animate the green box with rotation
                gsap.to(".box", {
                    rotation: 360,
                    duration: 2,
                    repeat: 10,
                    ease: "none"
                });

                // Animate the welcome text with SplitText
                const welcomeText = document.getElementById("welcome-text");
                if (welcomeText) {
                    let split = SplitText.create(welcomeText, {
                        type: "chars,words",
                        charsClass: "char",
                        wordsClass: "word"
                    });

                    // Animate each character
                    gsap.from(split.chars, {
                        y: 100,
                        autoAlpha: 0,
                        stagger: 0.05,
                        duration: .25
                    });
                }
            } else {
                // Retry if libraries haven't loaded yet
                setTimeout(initGSAPAnimation, 50);
            }
        }
        
        // Start animation when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGSAPAnimation);
        } else {
            initGSAPAnimation();
        }
    </script>

    <script>
        // Calendar Component
        class CalendarDemo {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.selectedDate = new Date();
                this.currentMonth = this.selectedDate.getMonth();
                this.currentYear = this.selectedDate.getFullYear();
                this.monthNames = [
                    "January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"
                ];
                this.dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
                this.init();
            }

            init() {
                this.render();
            }

            render() {
                const firstDay = new Date(this.currentYear, this.currentMonth, 1).getDay();
                const daysInMonth = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
                const daysInPrevMonth = new Date(this.currentYear, this.currentMonth, 0).getDate();

                let html = `
                    <div class="calendar-header">
                        <div class="calendar-nav">
                            <select id="calendar-month" class="calendar-select">
                                ${this.monthNames.map((month, idx) => 
                                    `<option value="${idx}" ${idx === this.currentMonth ? 'selected' : ''}>${month}</option>`
                                ).join('')}
                            </select>
                            <select id="calendar-year" class="calendar-select">
                                ${Array.from({length: 100}, (_, i) => {
                                    const year = this.currentYear - 50 + i;
                                    return `<option value="${year}" ${year === this.currentYear ? 'selected' : ''}>${year}</option>`;
                                }).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="calendar-body">
                        <div class="calendar-weekdays">
                            ${this.dayNames.map(day => `<div class="calendar-weekday">${day}</div>`).join('')}
                        </div>
                        <div class="calendar-days">
                `;

                // Previous month's trailing days
                for (let i = firstDay - 1; i >= 0; i--) {
                    const day = daysInPrevMonth - i;
                    html += `<div class="calendar-day calendar-day-other">${day}</div>`;
                }

                // Current month's days
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(this.currentYear, this.currentMonth, day);
                    const isSelected = this.isSameDate(date, this.selectedDate);
                    const isToday = this.isSameDate(date, new Date());
                    html += `
                        <div class="calendar-day ${isSelected ? 'calendar-day-selected' : ''} ${isToday ? 'calendar-day-today' : ''}" 
                             data-date="${date.toISOString()}">
                            ${day}
                        </div>
                    `;
                }

                // Next month's leading days
                const totalCells = 42; // 6 weeks × 7 days
                const remainingCells = totalCells - (firstDay + daysInMonth);
                for (let day = 1; day <= remainingCells; day++) {
                    html += `<div class="calendar-day calendar-day-other">${day}</div>`;
                }

                html += `
                        </div>
                    </div>
                `;

                this.container.innerHTML = html;

                // Add event listeners
                document.getElementById('calendar-month').addEventListener('change', (e) => {
                    this.currentMonth = parseInt(e.target.value);
                    this.render();
                });

                document.getElementById('calendar-year').addEventListener('change', (e) => {
                    this.currentYear = parseInt(e.target.value);
                    this.render();
                });

                // Add click listeners to days
                this.container.querySelectorAll('.calendar-day:not(.calendar-day-other)').forEach(day => {
                    day.addEventListener('click', () => {
                        const dateStr = day.getAttribute('data-date');
                        if (dateStr) {
                            this.selectedDate = new Date(dateStr);
                            this.render();
                        }
                    });
                });
            }

            isSameDate(date1, date2) {
                return date1.getFullYear() === date2.getFullYear() &&
                       date1.getMonth() === date2.getMonth() &&
                       date1.getDate() === date2.getDate();
            }
        }

        // Initialize calendar when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new CalendarDemo('calendar');
            });
        } else {
            new CalendarDemo('calendar');
        }
    </script>
</body>
</html>
