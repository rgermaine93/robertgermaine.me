<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-links">
                <a href="#home" class="nav-link">Home</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#contact" class="nav-link active">Contact</a>
            </div>
        </div>
    </nav>
    <div class="box gradient-green"></div>
    <h1 id="welcome-text" class="scroll-m-20 text-center text-4xl font-extrabold tracking-tight text-balance">
      Welcome To My Journey
    </h1>
    <div class="container">
        <form class="contact-form">
            <h1 class="form-title">Contact me</h1>
            <p class="form-description">Contact me and I'll get back to you as soon as possible.</p>
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail address</label>
                <input type="email" id="email" name="email" placeholder="Enter your e-mail address..." required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Choose a category</option>
                    <option value="general">General Inquiry</option>
                    <option value="business">Business</option>
                    <option value="support">Support</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Type your message here." required></textarea>
            </div>
            
            <button type="submit" class="submit-button">Send Message</button>
        </form>
    </div>
    <script src="js/gsap.min.js"></script>
    <script src="js/SplitText.min.js"></script>

    <script>
        // Wait for both GSAP and SplitText to be available
        function initGSAPAnimation() {
            if (typeof gsap !== 'undefined' && gsap.to && typeof SplitText !== 'undefined') {
                // Register SplitText plugin
                gsap.registerPlugin(SplitText);

                // Animate the green box with rotation
                gsap.to(".box", {
                    rotation: 360,
                    duration: 2,
                    repeat: 10,
                    ease: "none"
                });

                // Animate the welcome text with SplitText
                const welcomeText = document.getElementById("welcome-text");
                if (welcomeText) {
                    let split = SplitText.create(welcomeText, {
                        type: "chars,words",
                        charsClass: "char",
                        wordsClass: "word"
                    });

                    // Animate each character
                    gsap.from(split.chars, {
                        opacity: 0,
                        y: 50,
                        rotationX: -90,
                        duration: 0.8,
                        stagger: 0.02,
                        ease: "back.out(1.7)"
                    });
                }
            } else {
                // Retry if libraries haven't loaded yet
                setTimeout(initGSAPAnimation, 50);
            }
        }
        
        // Start animation when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGSAPAnimation);
        } else {
            initGSAPAnimation();
        }
    </script>
</body>
</html>
