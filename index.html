<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-beams" aria-hidden="true"></div>
    <div class="page-content">
    <div class="z-[60] mx-auto hidden w-full max-w-7xl flex-row items-center justify-between self-start rounded-full bg-white px-4 py-2 lg:flex dark:bg-neutral-950 sticky inset-x-0 top-40">
        <a class="relative z-20 mr-4 flex items-center space-x-2 px-2 py-1 text-sm font-normal text-black" href="/">
            <img alt="logo" width="30" height="30" src="https://assets.aceternity.com/logo-dark.png">
            <span class="font-medium text-black dark:text-white">DevStudio</span>
        </a>
        <div class="hidden flex-1 flex-row items-center justify-center space-x-2 text-sm font-medium text-zinc-600 transition duration-200 hover:text-zinc-800 lg:flex lg:space-x-2">
            <nav class="relative flex justify-center space-x-4 rounded-full bg-white px-4 py-3 dark:bg-neutral-950">
                <div class="relative">
                    <p class="cursor-pointer text-neutral-700 hover:opacity-[0.9] dark:text-neutral-300">Services</p>
                </div>
                <div class="relative">
                    <p class="cursor-pointer text-neutral-700 hover:opacity-[0.9] dark:text-neutral-300">Products</p>
                </div>
                <div class="relative">
                    <p class="cursor-pointer text-neutral-700 hover:opacity-[0.9] dark:text-neutral-300">Pricing</p>
                </div>
            </nav>
        </div>
        <button class="hidden rounded-full bg-black px-8 py-2 text-sm font-bold text-white shadow-[0px_-2px_0px_0px_rgba(255,255,255,0.4)_inset] md:block dark:bg-white dark:text-black">Book a call</button>
    </div>
    <h1 id="welcome-text" class="scroll-m-20 text-center text-4xl font-extrabold tracking-tight text-balance">
      Humans were created to create.
    </h1>
    <div class="container">
        <form class="contact-form">
            <h1 class="form-title">Contact me</h1>
            <p class="form-description">Contact me and I'll get back to you as soon as possible.</p>
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
            </div>
            
            <div class="form-group">
                <label for="email">E-mail address</label>
                <input type="email" id="email" name="email" placeholder="Enter your e-mail address..." required>
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    <option value="">Choose a category</option>
                    <option value="general">General Inquiry</option>
                    <option value="business">Business</option>
                    <option value="support">Support</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Type your message here." required></textarea>
            </div>
            
            <button type="submit" class="submit-button">Send Message</button>
        </form>
    </div>

    <!-- Calendar Component -->
    <div class="calendar-container">
        <div id="calendar" class="calendar rounded-md border shadow-sm"></div>
    </div>
    </div>

    <script src="js/gsap.min.js"></script>
    <script src="js/SplitText.min.js"></script>

    <script>
        // Wait for both GSAP and SplitText to be available
        function initGSAPAnimation() {
            if (typeof gsap !== 'undefined' && gsap.to && typeof SplitText !== 'undefined') {
                // Register SplitText plugin
                gsap.registerPlugin(SplitText);

                // Animate the green box with rotation
                gsap.to(".box", {
                    rotation: 360,
                    duration: 2,
                    repeat: 10,
                    ease: "none"
                });

                // Animate the welcome text with SplitText
                const welcomeText = document.getElementById("welcome-text");
                if (welcomeText) {
                    let split = SplitText.create(welcomeText, {
                        type: "chars,words",
                        charsClass: "char",
                        wordsClass: "word"
                    });

                    // Animate each character
                    gsap.from(split.chars, {
                        y: 100,
                        autoAlpha: 0,
                        stagger: 0.05,
                        duration: .25
                    });
                }
            } else {
                // Retry if libraries haven't loaded yet
                setTimeout(initGSAPAnimation, 50);
            }
        }
        
        // Start animation when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGSAPAnimation);
        } else {
            initGSAPAnimation();
        }
    </script>

    <script>
        // Calendar Component
        class CalendarDemo {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.selectedDate = new Date();
                this.currentMonth = this.selectedDate.getMonth();
                this.currentYear = this.selectedDate.getFullYear();
                this.monthNames = [
                    "January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"
                ];
                this.dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
                this.init();
            }

            init() {
                this.render();
            }

            render() {
                const firstDay = new Date(this.currentYear, this.currentMonth, 1).getDay();
                const daysInMonth = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
                const daysInPrevMonth = new Date(this.currentYear, this.currentMonth, 0).getDate();

                let html = `
                    <div class="calendar-header">
                        <div class="calendar-nav">
                            <select id="calendar-month" class="calendar-select">
                                ${this.monthNames.map((month, idx) => 
                                    `<option value="${idx}" ${idx === this.currentMonth ? 'selected' : ''}>${month}</option>`
                                ).join('')}
                            </select>
                            <select id="calendar-year" class="calendar-select">
                                ${Array.from({length: 100}, (_, i) => {
                                    const year = this.currentYear - 50 + i;
                                    return `<option value="${year}" ${year === this.currentYear ? 'selected' : ''}>${year}</option>`;
                                }).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="calendar-body">
                        <div class="calendar-weekdays">
                            ${this.dayNames.map(day => `<div class="calendar-weekday">${day}</div>`).join('')}
                        </div>
                        <div class="calendar-days">
                `;

                // Previous month's trailing days
                for (let i = firstDay - 1; i >= 0; i--) {
                    const day = daysInPrevMonth - i;
                    html += `<div class="calendar-day calendar-day-other">${day}</div>`;
                }

                // Current month's days
                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(this.currentYear, this.currentMonth, day);
                    const isSelected = this.isSameDate(date, this.selectedDate);
                    const isToday = this.isSameDate(date, new Date());
                    html += `
                        <div class="calendar-day ${isSelected ? 'calendar-day-selected' : ''} ${isToday ? 'calendar-day-today' : ''}" 
                             data-date="${date.toISOString()}">
                            ${day}
                        </div>
                    `;
                }

                // Next month's leading days
                const totalCells = 42; // 6 weeks × 7 days
                const remainingCells = totalCells - (firstDay + daysInMonth);
                for (let day = 1; day <= remainingCells; day++) {
                    html += `<div class="calendar-day calendar-day-other">${day}</div>`;
                }

                html += `
                        </div>
                    </div>
                `;

                this.container.innerHTML = html;

                // Add event listeners
                document.getElementById('calendar-month').addEventListener('change', (e) => {
                    this.currentMonth = parseInt(e.target.value);
                    this.render();
                });

                document.getElementById('calendar-year').addEventListener('change', (e) => {
                    this.currentYear = parseInt(e.target.value);
                    this.render();
                });

                // Add click listeners to days
                this.container.querySelectorAll('.calendar-day:not(.calendar-day-other)').forEach(day => {
                    day.addEventListener('click', () => {
                        const dateStr = day.getAttribute('data-date');
                        if (dateStr) {
                            this.selectedDate = new Date(dateStr);
                            this.render();
                        }
                    });
                });
            }

            isSameDate(date1, date2) {
                return date1.getFullYear() === date2.getFullYear() &&
                       date1.getMonth() === date2.getMonth() &&
                       date1.getDate() === date2.getDate();
            }
        }

        // Initialize calendar when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                new CalendarDemo('calendar');
            });
        } else {
            new CalendarDemo('calendar');
        }
    </script>
</body>
</html>
